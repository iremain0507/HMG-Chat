name: CI

# 계획(15-CI-PIPELINE.md)의 GitLab CI 의도를 GitHub Actions 로 적응.
# validate(typecheck/lint/test/build) + secret-scan(gitleaks) + sast(semgrep) + container-scan(trivy).
# 로컬 개발은 맥 미니, CI 는 ubuntu — CI 는 커밋하지 않으므로 dev/deploy 훅의 macOS 규칙과 무관.

on:
  pull_request:
  push:
    branches:
      - main
      - "integration/**"
    tags:
      - "v*.*.*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.28.2"
  NODE_VERSION: "22"

jobs:
  validate:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: semgrep scan (OWASP top-ten + TypeScript rulesets)
        run: semgrep --config p/owasp-top-ten --config p/typescript --error

  # 계획(15-CI-PIPELINE.md)의 container-scan 은 docker-build → ECR push 이미지를 trivy image
  # 로 스캔하지만, AWS 계정이 아직 LOCAL_ONLY(P0-T1-01 blocked_tasks 참고)라 이미지 빌드/ECR
  # 가 없다. 대신 저장소 filesystem + 의존성 CVE 를 trivy fs 로 스캔 — AWS 프로비저닝 후
  # deploy.yml 에 docker-build 단계가 추가되면 이미지 스캔으로 교체한다.
  container-scan:
    name: trivy (filesystem CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: trivy fs scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
